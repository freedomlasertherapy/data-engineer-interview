# Mart models schema
# The primary deliverable is fct_sales - a unified sales fact table
#
# Expected schema for fct_sales:
# - sale_id: Unique identifier (source_orderid_lineid)
# - source_system: 'costco', 'amazon', 'shopify'
# - source_order_id: Original order ID from source
# - source_line_id: Line item identifier
# - order_date: Normalized order date (DATE)
# - order_timestamp: Full timestamp (TIMESTAMP, nullable for Costco)
# - customer_id: Customer/member identifier
# - product_id: SKU/ASIN
# - product_name: Product description/title
# - product_category: Category (nullable)
# - quantity: Units sold (INTEGER)
# - unit_price: Price per unit (DECIMAL)
# - gross_amount: quantity * unit_price
# - discount_amount: Discounts applied
# - tax_amount: Tax (nullable)
# - shipping_amount: Shipping cost (nullable)
# - net_amount: Final amount after discounts
# - refund_amount: Refund amount (nullable)
# - ship_country: Shipping country (nullable)
# - ship_region: State/province (nullable)
# - ship_city: City (nullable)
# - payment_method: Payment type
# - order_status: 'completed', 'cancelled', 'refunded', 'partial_refund', 'pending'
# - is_cancelled: Boolean flag
# - is_refunded: Boolean flag
# - loaded_at: Pipeline load timestamp

version: 2

models:
  - name: fct_sales
    description: "Unified sales fact table across all retail channels"
    columns:
      - name: sale_id
        description: "Unique identifier (source_orderid_lineid)"
        tests:
          - unique
          - not_null
      - name: source_system
        description: "Source channel: costco, amazon, or shopify"
        tests:
          - not_null
          - accepted_values:
              values: ['costco', 'amazon', 'shopify']
      - name: source_order_id
        description: "Original order ID from source system"
        tests:
          - not_null
      - name: order_date
        description: "Normalized order date"
        tests:
          - not_null
      - name: quantity
        description: "Units sold"
        tests:
          - not_null
      - name: unit_price
        description: "Price per unit"
        tests:
          - not_null
      - name: net_amount
        description: "Final amount after discounts"
        tests:
          - not_null
      - name: order_status
        description: "Normalized order status"
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'cancelled', 'refunded', 'partial_refund', 'pending']
